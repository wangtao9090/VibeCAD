name: CI
on:
  push: { branches: [main] }
  pull_request: {}
jobs:
  lint-unit:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, macos-13, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest -q            # slow 默认跳过
  runtime-integration:
    needs: lint-unit
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]   # M4: 含 Windows 真验 DLL 链路
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv sync
      - name: install runtime + full real-machine suite
        env: { VIBECAD_RUN_INTEGRATION: "1" }
        # 全量 slow：A1/A2/A3 + 建模/视觉/特征/回滚契约（UndoMode 等修复的唯一 CI 防线）
        run: uv run pytest -m slow -v -s
