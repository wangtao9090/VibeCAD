name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  version-guard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: tag/version consistency guard
        # 不安装项目：纯 stdlib 静态读取四处版本，任一错位都在发布产物产生前拦截。
        run: python3 .github/scripts/check_release_versions.py "$GITHUB_REF_NAME"

  pypi:
    needs: version-guard
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - run: uv build
      - uses: pypa/gh-action-pypi-publish@release/v1
  mcpb:
    needs: version-guard
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 创建 GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - run: npx -y @anthropic-ai/mcpb@2.1.2 validate manifest.json
      - run: npx -y @anthropic-ai/mcpb@2.1.2 pack . VibeCAD.mcpb
      - name: create GitHub Release with .mcpb asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # gh 不从 tag 名推断预发布——rc/alpha/beta 显式 --prerelease，
          # 否则会顶掉 releases/latest（手册主链路就指它）。
          EXTRA=""
          case "$GITHUB_REF_NAME" in
            *rc*|*a[0-9]*|*b[0-9]*) EXTRA="--prerelease" ;;
          esac
          gh release create "${GITHUB_REF_NAME}" VibeCAD.mcpb \
            --title "VibeCAD ${GITHUB_REF_NAME}" \
            --generate-notes $EXTRA
